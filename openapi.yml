openapi: 3.0.0
info:
  title: KulmiPay API
  description: Public API reference for KulmiPay collections, Send Money, wallets,
    refunds, and M-Pesa account configuration.
  version: 1.0.0
security:
  - SecretAPIKeyScheme: []
paths:
  /chargebacks:
    get:
      operationId: chargebacks_list
      description: List refund and chargeback requests.
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                required:
                  - count
                  - results
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    format: uri
                    nullable: true
                  previous:
                    type: string
                    format: uri
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChargebacksReadSer"
      tags:
        - Refunds
      summary: List refunds
      x-mint:
        metadata:
          sidebarTitle: List refunds
    post:
      operationId: chargebacks_create
      description: Create a refund request.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargebacksReadSer"
        required: true
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargebacksReadSer"
      tags:
        - Refunds
      summary: Create refund
      x-mint:
        metadata:
          sidebarTitle: Create refund
    parameters: []
  /chargebacks/{id}:
    get:
      operationId: chargebacks_read
      description: Retrieve one refund by chargeback ID.
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChargebacksReadSer"
      tags:
        - Refunds
      summary: Retrieve refund
      x-mint:
        metadata:
          sidebarTitle: Retrieve refund
    parameters:
      - name: id
        in: path
        description: A unique integer value identifying this Chargeback.
        required: true
        schema:
          type: integer
  /checkout:
    post:
      operationId: checkout_create
      description: Create a hosted checkout session.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutSer"
        required: true
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSer"
      tags:
        - Collections
      summary: Create checkout session
      x-mint:
        metadata:
          sidebarTitle: Create checkout session
    parameters: []
  /checkout/details:
    post:
      operationId: checkout_details
      description: Retrieve checkout details for an existing checkout session.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutDetailsRequestSer"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSer"
      tags:
        - Collections
      summary: Get checkout details
      x-mint:
        metadata:
          sidebarTitle: Get checkout details
    parameters: []
  /mpesa-paybill-accounts:
    get:
      operationId: mpesa-paybill-accounts_list
      description: List configured M-Pesa Till and PayBill accounts.
      parameters:
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                required:
                  - count
                  - results
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    format: uri
                    nullable: true
                  previous:
                    type: string
                    format: uri
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/MPesaPaybillAccountsSer"
      tags:
        - Bring Your M-Pesa Till/PayBill Number
      summary: List M-Pesa accounts
      x-mint:
        metadata:
          sidebarTitle: List M-Pesa accounts
    post:
      operationId: mpesa-paybill-accounts_create
      description: Register an M-Pesa Till or PayBill account for configuration.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MPesaPaybillAccountsSer"
        required: true
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MPesaPaybillAccountsSer"
      tags:
        - Bring Your M-Pesa Till/PayBill Number
      summary: Create M-Pesa account
      x-mint:
        metadata:
          sidebarTitle: Create M-Pesa account
    parameters: []
  /mpesa-paybill-accounts/{id}:
    get:
      operationId: mpesa-paybill-accounts_read
      description: Retrieve one configured M-Pesa Till or PayBill account.
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MPesaPaybillAccountsSer"
      tags:
        - Bring Your M-Pesa Till/PayBill Number
      summary: Retrieve M-Pesa account
      x-mint:
        metadata:
          sidebarTitle: Retrieve M-Pesa account
    parameters:
      - name: id
        in: path
        description: A unique integer value identifying this MPesa Paybill Account.
        required: true
        schema:
          type: integer
  /payment/mpesa-stk-push:
    post:
      operationId: payment_mpesa-stk-push_create
      description: Send an M-Pesa payment prompt to a customer phone number.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MPesaSTKPushInit"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSessionsSer"
      tags:
        - Collections
      summary: Start M-Pesa STK Push
      x-mint:
        metadata:
          sidebarTitle: Start M-Pesa STK Push
    parameters: []
  /payment/status:
    post:
      operationId: payment_status_create
      description: Check the state of a collection invoice.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentStatus"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResults"
      tags:
        - Collections
      summary: Check payment status
      x-mint:
        metadata:
          sidebarTitle: Check payment status
    parameters: []
  /send-money/approve:
    post:
      operationId: send-money_approve_create
      description: Approve a send money payment file.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMoneyResponse"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMoneyResult"
      tags:
        - Send Money
      summary: Approve send money
      x-mint:
        metadata:
          sidebarTitle: Approve send money
    parameters: []
  /send-money/bank-codes/ke:
    get:
      operationId: send-money_bank-codes_ke_list
      description: List supported Kenyan bank codes for PesaLink payouts.
      responses:
        "200":
          description: ""
      tags:
        - Send Money
      summary: List bank codes
      x-mint:
        metadata:
          sidebarTitle: List bank codes
    parameters: []
  /send-money/cancel:
    post:
      operationId: send-money_cancel_create
      description: Cancel a send money payment file before processing.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMoneyCancel"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMoneyResult"
      tags:
        - Send Money
      summary: Cancel send money
      x-mint:
        metadata:
          sidebarTitle: Cancel send money
    parameters: []
  /send-money/initiate:
    post:
      operationId: send-money_initiate_create
      description: Create a send money payment file.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMoneyInit"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMoneyResponse"
      tags:
        - Send Money
      summary: Initiate send money
      x-mint:
        metadata:
          sidebarTitle: Initiate send money
    parameters: []
  /send-money/status:
    post:
      operationId: send-money_status_create
      description: Check payout file and transaction status.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMoneyStatus"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMoneyResult"
      tags:
        - Send Money
      summary: Check send money status
      x-mint:
        metadata:
          sidebarTitle: Check send money status
    parameters: []
  /wallets:
    get:
      operationId: wallets_list
      description: List wallets on your account.
      parameters:
        - name: record_id
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: label
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: wallet_type
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: currency
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: can_disburse
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: updated_at
          in: query
          description: ""
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: A page number within the paginated result set.
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                required:
                  - count
                  - results
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    format: uri
                    nullable: true
                  previous:
                    type: string
                    format: uri
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/WalletSer"
      tags:
        - Wallet as a Service
      summary: List wallets
      x-mint:
        metadata:
          sidebarTitle: List wallets
    post:
      operationId: wallets_create
      description: Create a working wallet.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletCreateSer"
        required: true
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletCreateSer"
      tags:
        - Wallet as a Service
      summary: Create wallet
      x-mint:
        metadata:
          sidebarTitle: Create wallet
    parameters: []
  /wallets/{id}:
    get:
      operationId: wallets_read
      description: Retrieve one wallet by ID.
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletSer"
      tags:
        - Wallet as a Service
      summary: Retrieve wallet
      x-mint:
        metadata:
          sidebarTitle: Retrieve wallet
    parameters:
      - name: id
        in: path
        description: A unique integer value identifying this wallet.
        required: true
        schema:
          type: integer
  /wallets/{id}/intra_transfer:
    post:
      operationId: wallets_intra_transfer
      description: Move funds between wallets on your account.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntraTransferSer"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletSer"
      tags:
        - Wallet as a Service
      summary: Create internal transfer
      x-mint:
        metadata:
          sidebarTitle: Create internal transfer
    parameters:
      - name: id
        in: path
        description: A unique integer value identifying this wallet.
        required: true
        schema:
          type: integer
  /wallets/{id}/transactions:
    get:
      operationId: wallets_transactions
      description: Retrieve wallet transaction history.
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionSer"
      tags:
        - Wallet as a Service
      summary: List wallet transactions
      x-mint:
        metadata:
          sidebarTitle: List wallet transactions
    parameters:
      - name: id
        in: path
        description: A unique integer value identifying this wallet.
        required: true
        schema:
          type: integer
  /payment/collection:
    post:
      tags:
        - Collections
      summary: Collect payment
      description: Initiate a payment collection through M-Pesa or PesaLink.
      operationId: collect_payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
                - currency
                - amount
                - api_ref
              properties:
                method:
                  type: string
                  enum:
                    - M-PESA
                    - PESALINK
                currency:
                  type: string
                  example: KES
                amount:
                  type: string
                  example: "1500.00"
                api_ref: &a1
                  type: string
                phone_number: *a1
                email: *a1
                first_name: *a1
                last_name: *a1
                public_key: *a1
                wallet_id: *a1
                mobile_tarrif:
                  type: string
                  enum:
                    - BUSINESS-PAYS
                    - CUSTOMER-PAYS
                bank_tarrif:
                  type: string
                  enum:
                    - BUSINESS-PAYS
                    - CUSTOMER-PAYS
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice:
                    type: object
                  signature: *a1
      x-mint:
        metadata:
          sidebarTitle: Collect payment
  /send-money/validate-accounts:
    post:
      tags:
        - Send Money
      summary: Validate account
      description: Validate recipient details before sending money.
      operationId: validate_account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - account
              properties:
                provider:
                  type: string
                  enum:
                    - MPESA-B2C
                    - MPESA-B2B
                    - PESALINK
                    - P2P
                account: *a1
                bank_code: *a1
                account_type:
                  type: string
                  enum:
                    - PayBill
                    - TillNumber
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
      x-mint:
        metadata:
          sidebarTitle: Validate account
  /webhooks:
    get:
      tags:
        - Webhooks
      summary: List webhooks
      description: List configured webhooks for your KulmiPay account.
      operationId: list_webhooks
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
      x-mint:
        metadata:
          sidebarTitle: List webhooks
  /webhooks-events:
    get:
      tags:
        - Webhooks
      summary: List webhook events
      description: List webhook delivery events for your KulmiPay account.
      operationId: list_webhook_events
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
      x-mint:
        metadata:
          sidebarTitle: List webhook events
  /send-money/beneficiaries:
    get:
      tags:
        - Send Money
      summary: List beneficiaries
      description: List saved Send Money recipients for your account.
      operationId: list_beneficiaries
      parameters:
        - name: provider
          in: query
          required: false
          description: Filter by provider, such as MPESA-B2C or PESALINK.
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Search by name, account number, or account reference.
          schema:
            type: string
        - name: is_active
          in: query
          required: false
          description: Filter by active status.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    account:
                      type: string
                    provider:
                      type: string
                      enum:
                        - MPESA-B2C
                        - MPESA-B2B
                        - PESALINK
                        - P2P
                    account_reference:
                      type: string
                      nullable: true
                    is_active:
                      type: boolean
      x-mint:
        metadata:
          sidebarTitle: List beneficiaries
  /send-money/beneficiaries/frequently_used:
    get:
      tags:
        - Send Money
      summary: List frequently used beneficiaries
      description: List your most frequently used recipients for a provider.
      operationId: list_frequently_used_beneficiaries
      parameters:
        - name: provider
          in: query
          required: true
          description: Provider to retrieve frequently used recipients for.
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    account:
                      type: string
                    provider:
                      type: string
                      enum:
                        - MPESA-B2C
                        - MPESA-B2B
                        - PESALINK
                        - P2P
                    account_reference:
                      type: string
                      nullable: true
                    is_active:
                      type: boolean
      x-mint:
        metadata:
          sidebarTitle: List frequently used beneficiaries
servers:
  - url: https://sandbox.kulmipay.com/api/v1
    description: Sandbox
  - url: https://app.kulmipay.com/api/v1
    description: Live
components:
  requestBodies:
    PlanSer:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PlanSer"
      required: true
    PaymentLinksSer:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentLinksSer"
      required: true
    CustomerSer:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CustomerSer"
      required: true
  securitySchemes:
    SecretAPIKeyScheme:
      type: http
      scheme: bearer
      description: Use your KulmiPay secret key as the Bearer token.
      x-default: ISSecretKey_test_xxxxxxxxxxxxxxxx
    PublicAPIKeyScheme:
      type: apiKey
      in: header
      name: X-KULMI-PUBLIC-API-KEY
      description: Use your KulmiPay publishable key for public checkout and
        collection requests.
      x-default: ISPubKey_test_xxxxxxxxxxxxxxxx
  schemas:
    InvoicesSer:
      required:
        - provider
        - value
      type: object
      properties:
        invoice_id:
          title: Invoice id
          type: string
          readOnly: true
        state:
          title: State
          type: string
          enum:
            - PENDING
            - PROCESSING
            - FAILED
            - CANCELED
            - PARTIAL
            - COMPLETE
            - RETRY
        provider:
          title: Provider
          type: string
          enum:
            - M-PESA
            - PESALINK
        charges:
          title: Charges
          type: string
          format: decimal
        net_amount:
          title: Net amount
          type: string
          readOnly: true
        currency:
          title: Currency
          type: string
          readOnly: true
        value:
          title: Value
          type: string
          format: decimal
        account:
          title: Account
          description: Depositing account, email or phone number
          type: string
          maxLength: 140
          nullable: true
        api_ref:
          title: Api ref
          description: API tracking reference number
          type: string
          pattern: ^[a-zA-Z0-9-_ ]+$
          maxLength: 140
          nullable: true
        clearing_status:
          title: Clearing status
          type: string
          readOnly: true
        mpesa_reference:
          title: Mpesa reference
          type: string
          readOnly: true
        host:
          title: Host
          description: Payment origin host i.e domain making the payment
          type: string
          pattern: ^[a-zA-Z0-9-_./=:?# ]+$
          maxLength: 200
          nullable: true
        retry_count:
          title: Retry count
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        failed_reason:
          title: Failed reason
          type: string
          nullable: true
        failed_code:
          title: Failed code
          type: string
          maxLength: 45
          nullable: true
        failed_code_link:
          title: Failed code link
          type: string
          readOnly: true
        created_at:
          title: Created at
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          title: Updated at
          type: string
          format: date-time
          readOnly: true
          nullable: true
    TransactionSer:
      required:
        - invoice
      type: object
      properties:
        transaction_id:
          title: Transaction id
          type: string
          readOnly: true
        invoice:
          $ref: "#/components/schemas/InvoicesSer"
        currency:
          title: Currency
          type: string
          readOnly: true
        value:
          title: Value
          type: string
          format: decimal
          readOnly: true
        running_balance:
          title: Running balance
          type: string
          format: decimal
          readOnly: true
        narrative:
          title: Narrative
          type: string
          nullable: true
        trans_type:
          title: Trans type
          type: string
          enum:
            - SALE
            - ADJUSTMENT
            - PAYOUT
            - CHARGE
            - AIRTIME
            - DEPOSIT
            - EXCHANGE
            - UNMARKED
        status:
          title: Status
          type: string
          enum:
            - AVAILABLE
            - CLEARING
            - ON-HOLD
            - CANCELLED
            - CHARGEBACK-PENDING
            - REFUNDED
            - ADJUSTMENT
        created_at:
          title: Created at
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          title: Updated at
          type: string
          format: date-time
          readOnly: true
          nullable: true
    ChargebacksReadSer:
      required:
        - transaction
        - reason
      type: object
      properties:
        chargeback_id:
          title: Chargeback id
          type: string
          readOnly: true
        session_id:
          title: Session id
          type: string
          readOnly: true
        transaction:
          $ref: "#/components/schemas/TransactionSer"
        amount:
          title: Amount
          type: string
          format: decimal
        reason:
          title: Reason
          type: string
          enum:
            - Unavailable service
            - Delayed delivery
            - Wrong service
            - Duplicate payment
            - Other
        status:
          title: Status
          type: string
          readOnly: true
          minLength: 1
        resolution:
          title: Resolution
          description: Resolution statement
          type: string
          pattern: ^[a-zA-Z0-9-_ ]+$
          nullable: true
        staff_created:
          title: Staff created
          description: Specify if chargeback was initiated by the admin
          type: boolean
          readOnly: true
        created_at:
          title: Created at
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          title: Updated at
          type: string
          format: date-time
          readOnly: true
          nullable: true
    CheckoutSer:
      type: object
      properties:
        id:
          title: Id
          type: string
          format: uuid
          readOnly: true
        url:
          title: Url
          type: string
          readOnly: true
          minLength: 1
        signature:
          title: Signature
          type: string
          readOnly: true
          minLength: 1
        first_name:
          title: First name
          type: string
          pattern: ^[a-zA-Z0-9-_ ]+$
          maxLength: 45
          nullable: true
        last_name:
          title: Last name
          type: string
          pattern: ^[a-zA-Z0-9-_ ]+$
          maxLength: 45
